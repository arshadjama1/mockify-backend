# Production Environment Configuration

server:
  port: ${PORT:8080}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  lifecycle:
    timeout-per-shutdown-phase: 20s

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 5      # Neon free tier has connection limits
      connection-timeout: 20000

  jpa:
    show-sql: false

  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true            # Upstash requires TLS

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: ${GOOGLE_REDIRECT_URI}

jwt:
  secret: ${JWT_SECRET}
  access:
    expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION:86400000}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

app:
  frontend:
    url: ${FRONTEND_URL}
    reset-password-url: ${FRONTEND_URL}/reset-password
  verification:
    email:
      frontend-url: ${FRONTEND_URL}/verify-email

  cookie:
    refresh-token:
      name: refresh_token
      path: /api/auth
      max-age: 604800
      secure: true
      same-site: None

  api-key:
    secret: ${API_KEY_SECRET}
    max-per-organization: 20

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
