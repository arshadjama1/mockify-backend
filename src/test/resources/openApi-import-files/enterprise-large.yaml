openapi: 3.0.3
info:
  title: Enterprise E-Commerce API
  version: 2.0.0
  description: Large enterprise-grade OpenAPI specification for testing Mockify advanced schema import

paths:
  /users:
    get:
      summary: Get all users
      responses:
        '200':
          description: Successful response

  /products:
    get:
      summary: Get all products
      responses:
        '200':
          description: Successful response

  /orders:
    get:
      summary: Get all orders
      responses:
        '200':
          description: Successful response

  /payments:
    get:
      summary: Get all payments
      responses:
        '200':
          description: Successful response

components:
  schemas:

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        profile:
          type: object
          properties:
            age:
              type: integer
            gender:
              type: string
            avatarUrl:
              type: string
              format: uri
        addresses:
          type: array
          items:
            type: object
            properties:
              street:
                type: string
              city:
                type: string
              state:
                type: string
              zipCode:
                type: string
              country:
                type: string

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        sku:
          type: string
        price:
          type: number
        stock:
          type: integer
        isAvailable:
          type: boolean
        category:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        tags:
          type: array
          items:
            type: string
        dimensions:
          type: object
          properties:
            width:
              type: number
            height:
              type: number
            depth:
              type: number
        createdAt:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        orderNumber:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
                format: uuid
              quantity:
                type: integer
              unitPrice:
                type: number
              subtotal:
                type: number
        shippingAddress:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            zipCode:
              type: string
            country:
              type: string
        billingAddress:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            zipCode:
              type: string
            country:
              type: string
        placedAt:
          type: string
          format: date-time

    Payment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        transactionId:
          type: string
        method:
          type: string
        status:
          type: string
        amount:
          type: number
        currency:
          type: string
        paidAt:
          type: string
          format: date-time
        cardDetails:
          type: object
          properties:
            cardHolderName:
              type: string
            last4:
              type: string
            expiryMonth:
              type: integer
            expiryYear:
              type: integer

    Inventory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        warehouseLocation:
          type: string
        quantityAvailable:
          type: integer
        quantityReserved:
          type: integer
        reorderLevel:
          type: integer
        updatedAt:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        rating:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
          format: date-time

    Coupon:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        discountType:
          type: string
        discountValue:
          type: number
        isActive:
          type: boolean
        validFrom:
          type: string
          format: date-time
        validUntil:
          type: string
          format: date-time

    Shipment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        carrier:
          type: string
        trackingNumber:
          type: string
        shippedAt:
          type: string
          format: date-time
        deliveredAt:
          type: string
          format: date-time
        shippingStatus:
          type: string